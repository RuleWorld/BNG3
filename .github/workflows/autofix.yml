name: Auto-fix lint

on:
  push:
    branches: [main, develop]
    paths:
      - "python/**"
      - "tests/python/**"
      - "scripts/**"

permissions:
  contents: write

jobs:
  autofix:
    name: Format & fix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install formatters
        run: pip install black ruff

      - name: Run Black
        run: black --target-version py312 python/ tests/python/ scripts/

      - name: Run Ruff fix
        run: ruff check --fix python/ tests/python/ scripts/ || true

      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No formatting changes needed"
          else
            git commit -m "style: auto-fix lint (black + ruff)"
            git push
          fi
