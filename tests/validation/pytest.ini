[pytest]
# Run from the repo root: `pytest -c tests/validation/pytest.ini`
# or rely on the root pyproject [tool.pytest.ini_options] mirroring these markers.
pythonpath = .
addopts = --import-mode=importlib -ra
markers =
    smoke: Tier-S, runs on every commit (fast)
    parity: Tier-P, full corpus, nightly / WO completion
    nf: network-free, compared against the native NFsim oracle
    stochastic: SSA/PLA/PSA ensemble checks
    expressions: rate-law / local-function RHS checks
    export: export-format validity
    slow: long-running (ensembles); excluded from the smoke gate
